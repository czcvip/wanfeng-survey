<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="format-detection" content="telephone=no">
  <meta name="description" content="小件速运商业模式验证调查，用于判断是否进入研发立项。">
  <meta property="og:title" content="小件速运商业模式验证调查">
  <meta property="og:description" content="请用3-8分钟填写，帮助判断小件速运是否值得立项。">
  <title>小件速运商业模式验证调查</title>
  <style>
    :root {
      --bg: #f7f3ea;
      --panel: #fffdfa;
      --ink: #1f2328;
      --muted: #667085;
      --line: #ddd6c8;
      --brand: #126a73;
      --brand-2: #9a4f22;
      --soft: #e9f4f2;
      --warn: #fff4d6;
      --danger: #b42318;
      --ok: #177245;
      --radius: 8px;
      --shadow: 0 12px 30px rgba(31, 35, 40, 0.08);
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      color: var(--ink);
      background:
        linear-gradient(180deg, rgba(18, 106, 115, 0.08), transparent 240px),
        var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      line-height: 1.55;
    }

    button, input, select, textarea {
      font: inherit;
    }

    .shell {
      width: min(920px, 100%);
      margin: 0 auto;
      padding: 18px 14px 48px;
    }

    .top {
      padding: 18px 4px 16px;
    }

    .kicker {
      margin: 0 0 8px;
      color: var(--brand);
      font-size: 13px;
      font-weight: 700;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.18;
      letter-spacing: 0;
    }

    .lead {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 15px;
    }

    .status {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin: 16px 0;
    }

    .status div {
      min-height: 72px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 253, 250, 0.78);
    }

    .status strong {
      display: block;
      font-size: 18px;
      line-height: 1.2;
      color: var(--brand-2);
    }

    .status span {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
    }

    .panel {
      margin-top: 12px;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .panel h2 {
      margin: 0 0 10px;
      font-size: 18px;
      line-height: 1.3;
      letter-spacing: 0;
    }

    .type-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .type-btn,
    .action-btn,
    .ghost-btn {
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      color: var(--ink);
      cursor: pointer;
    }

    .type-btn {
      padding: 10px 8px;
      text-align: center;
      font-weight: 700;
    }

    .type-btn.active {
      border-color: var(--brand);
      background: var(--soft);
      color: var(--brand);
    }

    .note {
      margin: 10px 0 0;
      padding: 10px 12px;
      border-radius: var(--radius);
      background: var(--warn);
      color: #694100;
      font-size: 13px;
    }

    .section {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--line);
    }

    .section h3 {
      margin: 0 0 10px;
      font-size: 16px;
    }

    .field {
      margin: 12px 0;
    }

    .field label {
      display: block;
      margin-bottom: 7px;
      font-weight: 700;
      font-size: 14px;
    }

    .required::after {
      content: " *";
      color: var(--danger);
    }

    input[type="text"],
    input[type="tel"],
    input[type="number"],
    select,
    textarea {
      width: 100%;
      min-height: 44px;
      padding: 10px 11px;
      border: 1px solid #cfc6b7;
      border-radius: var(--radius);
      background: #fff;
      color: var(--ink);
      outline: none;
    }

    textarea {
      min-height: 84px;
      resize: vertical;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(18, 106, 115, 0.14);
    }

    .choices {
      display: grid;
      gap: 7px;
    }

    .choice {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      min-height: 40px;
      padding: 9px 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
    }

    .choice input {
      width: 18px;
      height: 18px;
      margin-top: 2px;
      flex: 0 0 auto;
    }

    .choice span {
      min-width: 0;
      font-size: 14px;
    }

    .split {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .actions {
      position: sticky;
      bottom: 0;
      z-index: 5;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin: 16px -16px -16px;
      padding: 10px 16px calc(10px + env(safe-area-inset-bottom));
      border-top: 1px solid var(--line);
      background: rgba(255, 253, 250, 0.96);
      backdrop-filter: blur(10px);
    }

    .action-btn {
      border-color: var(--brand);
      background: var(--brand);
      color: #fff;
      font-weight: 800;
    }

    .ghost-btn {
      background: #fff;
      color: var(--brand);
      font-weight: 800;
    }

    .result {
      display: none;
      margin-top: 14px;
      border-color: rgba(23, 114, 69, 0.35);
      background: #f2fbf6;
    }

    .result.show { display: block; }

    .result textarea {
      min-height: 180px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
    }

    .result-actions {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 10px;
    }

    .small {
      color: var(--muted);
      font-size: 12px;
    }

    .error {
      display: none;
      margin-top: 10px;
      color: var(--danger);
      font-size: 13px;
      font-weight: 700;
    }

    .error.show { display: block; }

    @media (max-width: 720px) {
      h1 { font-size: 24px; }
      .status { grid-template-columns: 1fr 1fr; }
      .type-grid { grid-template-columns: 1fr 1fr; }
      .split { grid-template-columns: 1fr; }
      .result-actions { grid-template-columns: 1fr; }
    }

    @media (max-width: 420px) {
      .status { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="top">
      <p class="kicker">小件速运 · 立项前验证</p>
      <h1>商业模式验证调查</h1>
      <p class="lead">请选择您的身份填写。结果用于判断小件速运是否值得进入研发立项，重点验证真实需求、价格接受度、司机履约和单均毛利。</p>
      <div class="status" aria-label="验证指标">
        <div><strong>3-8分钟</strong><span>预计填写时间</span></div>
        <div><strong>38元左右</strong><span>核心价格验证</span></div>
        <div><strong>2周试运行</strong><span>立项前关键动作</span></div>
      </div>
    </header>

    <section class="panel" aria-labelledby="type-title">
      <h2 id="type-title">选择调查对象</h2>
      <div class="type-grid" id="typeGrid"></div>
      <p class="note">微信分享使用建议：部署为HTTPS网页后，把链接发到微信群、朋友圈、公众号菜单或生成二维码。若需要自动汇总，请配置页面内的提交接口。</p>
    </section>

    <form class="panel" id="surveyForm">
      <h2 id="formTitle">个人用户/乘客调查</h2>
      <div id="formFields"></div>
      <div class="error" id="errorBox">请补充必填项后再提交。</div>
      <div class="actions">
        <button class="ghost-btn" type="button" id="resetBtn">清空重填</button>
        <button class="action-btn" type="submit" id="submitBtn">提交</button>
      </div>
    </form>

    <section class="panel result" id="resultPanel" aria-labelledby="result-title">
      <h2 id="result-title">提交成功</h2>
      <p>感谢您的参与，您的反馈已记录。我们会综合您和其他受访者的意见做立项判断。</p>
      <div class="actions">
        <button class="ghost-btn" type="button" id="againBtn">再填一份</button>
      </div>
    </section>
  </main>

  <script>
    /*
      配置说明：
      1. 静态分享：直接部署本HTML到HTTPS服务器，即可微信分享。
      2. 自动收集：把 SURVEY_ENDPOINT 改成你们自己的接口地址。
         接口建议接受 JSON POST，并返回 2xx 状态码。
      3. 微信自定义分享卡片：需要公众号/企业微信域名校验和JS-SDK签名服务。
    */
    const SURVEY_ENDPOINT = "https://wanfeng-survey-wqswzkyemi.cn-hangzhou.fcapp.run/";

    const types = [
      { id: "personal", title: "个人用户/乘客" },
      { id: "merchant", title: "沿线商户" },
      { id: "driver", title: "司机" },
      { id: "ops", title: "站点/运营" }
    ];

    const commonFields = [
      { id: "name", label: "姓名/称呼", type: "text", required: true },
      { id: "phone", label: "联系电话/微信", type: "tel", required: false },
      { id: "route_from", label: "常用起点", type: "text", required: true },
      { id: "route_to", label: "常用终点", type: "text", required: true }
    ];

    const schemas = {
      personal: {
        title: "个人用户/乘客调查",
        sections: [
          {
            title: "过去30天真实需求",
            fields: [
              { id: "recent_need", label: "过去30天内，是否有过当天寄送小件的需求？", type: "radio", required: true, options: ["没有", "有1次", "有2-3次", "有4次及以上"] },
              { id: "goods", label: "最近一次想寄送的物品", type: "select", required: true, options: ["文件/证件", "衣物/生活用品", "水果/生鲜", "糕点/食品", "鲜花/礼品", "数码/配件", "汽配/工具", "宠物", "其他"] },
              { id: "current_solution", label: "当时用什么方式解决？", type: "radio", required: true, options: ["快递", "跑腿/同城配送", "找熟人/司机带", "自己送", "没解决/耽误了", "其他"] },
              { id: "pain_points", label: "当前方式最不满意的地方", type: "checkbox", required: false, options: ["不能当天到", "太贵", "不上门取/送", "乡镇/偏远地址覆盖不到", "怕丢失或损坏", "找人麻烦", "没有实时状态"] }
            ]
          },
          {
            title: "价格与试单意愿",
            fields: [
              { id: "value", label: "您认为这类服务最有价值的是？", type: "checkbox", required: true, options: ["当天送达", "可送县城/乡镇", "比找熟人省心", "有平台担保", "可上门取送", "价格便宜"] },
              { id: "price_accept", label: "跨县/跨城短途当天达，38元/单是否愿意使用？", type: "radio", required: true, options: ["愿意，价格可以接受", "视物品重要程度而定", "偶尔急用可以接受", "偏贵，只能接受更低价格", "不愿意"] },
              { id: "max_price", label: "可接受价格上限", type: "radio", required: true, options: ["20元以内", "21-30元", "31-38元", "39-50元", "51-80元", "80元以上"] },
              { id: "trial", label: "下周人工试运行，是否愿意真实下单体验？", type: "radio", required: true, options: ["愿意，并愿意留下联系方式", "有需要时愿意", "先观望", "不愿意"] },
              { id: "concerns", label: "最大的顾虑", type: "checkbox", required: false, options: ["怕丢件", "怕损坏", "怕延误", "怕司机不专业", "怕投诉没人管", "怕价格变化", "怕不能送到具体地址", "没有顾虑"] }
            ]
          }
        ]
      },
      merchant: {
        title: "沿线商户调查",
        sections: [
          {
            title: "商户发货情况",
            fields: [
              { id: "shop_name", label: "商户名称", type: "text", required: true },
              { id: "shop_type", label: "商户类型", type: "select", required: true, options: ["水果", "生鲜", "糕点", "鲜花", "汽配", "文件票据", "小商品", "其他"] },
              { id: "monthly_orders", label: "每月大约有多少单发往县城/乡镇/跨城短途？", type: "radio", required: true, options: ["0单", "1-5单", "6-20单", "21-50单", "51-100单", "100单以上"] },
              { id: "same_day_orders", label: "其中希望当天送达的订单量", type: "radio", required: true, options: ["几乎没有", "1-5单/月", "6-20单/月", "21-50单/月", "50单以上/月"] },
              { id: "delivery_now", label: "当前主要发货方式", type: "checkbox", required: true, options: ["快递", "跑腿", "客运司机/熟人带货", "自有员工配送", "客户自取", "其他"] }
            ]
          },
          {
            title: "复购与付费意愿",
            fields: [
              { id: "ship_goods", label: "最可能发什么品类？", type: "checkbox", required: true, options: ["文件/票据", "水果", "生鲜", "糕点/食品", "鲜花", "汽配/工具", "样品/小商品", "其他"] },
              { id: "merchant_price", label: "能接受的单次配送价格", type: "radio", required: true, options: ["20元以内", "21-30元", "31-38元", "39-50元", "51-80元", "80元以上，视距离和时效而定"] },
              { id: "future_orders", label: "如果稳定当天达，预计每月会下多少单？", type: "radio", required: true, options: ["0单", "1-5单", "6-20单", "21-50单", "51-100单", "100单以上"] },
              { id: "settlement", label: "是否愿意预存或月结？", type: "radio", required: true, options: ["愿意预存", "愿意月结", "只接受按单支付", "暂不考虑"] },
              { id: "long_term_terms", label: "什么条件满足后愿意长期使用？", type: "checkbox", required: false, options: ["当天达稳定", "价格固定", "丢损可赔", "有专人对接", "可开发票/对账", "可上门取货", "可送乡镇/村镇"] }
            ]
          }
        ]
      },
      driver: {
        title: "司机供给侧调查",
        sections: [
          {
            title: "接单意愿",
            fields: [
              { id: "vehicle", label: "车辆类型", type: "select", required: true, options: ["二轮", "三轮", "四轮", "客运车辆", "其他"] },
              { id: "daily_frequency", label: "每日班次/出车频次", type: "text", required: true },
              { id: "carry_willing", label: "是否愿意在不影响乘客体验的情况下顺路带小件？", type: "radio", required: true, options: ["愿意", "视货物和路线而定", "只愿意网点到网点", "不愿意"] },
              { id: "task_types", label: "愿意承接哪类任务？", type: "checkbox", required: true, options: ["上门取货", "起点网点收货", "跨城/跨县中转", "终点网点交货", "上门送货", "只愿意顺路带"] },
              { id: "goods_accept", label: "愿意带哪些货物？", type: "checkbox", required: false, options: ["文件/证件", "普通物品", "水果/食品", "生鲜", "数码/贵重物品", "汽配/工具", "宠物", "都要看情况"] }
            ]
          },
          {
            title: "收入与履约",
            fields: [
              { id: "driver_income", label: "每单给到司机多少收入，愿意接顺路带货？", type: "radio", required: true, options: ["5元以内", "6-10元", "11-20元", "21-30元", "30元以上", "看距离和取送货时间"] },
              { id: "detour_price", label: "额外绕路取送货，希望如何加价？", type: "radio", required: true, options: ["固定加价", "按公里加价", "按时间加价", "不接受额外绕路"] },
              { id: "photo", label: "是否愿意按平台要求拍照上传？", type: "radio", required: true, options: ["愿意", "可以，但希望操作简单", "不太愿意", "不愿意"] },
              { id: "daily_limit", label: "每天最多愿意接多少单？", type: "radio", required: true, options: ["1单", "2-3单", "4-5单", "5单以上", "只要顺路都可以"] },
              { id: "driver_concerns", label: "最大的顾虑", type: "checkbox", required: false, options: ["耽误载客", "取送货麻烦", "价格太低", "货物丢损责任", "用户投诉", "系统操作麻烦", "结算提现慢", "没有顾虑"] }
            ]
          }
        ]
      },
      ops: {
        title: "站点/运营可行性调查",
        sections: [
          {
            title: "试点线路和承载能力",
            fields: [
              { id: "role", label: "您的岗位", type: "select", required: true, options: ["站点负责人", "客服", "调度", "运营管理", "车队管理", "其他"] },
              { id: "best_routes", label: "最适合先试运行的1-3条线路", type: "textarea", required: true },
              { id: "station_condition", label: "站点是否具备临时收货/交接条件？", type: "radio", required: true, options: ["具备", "部分具备", "不具备"] },
              { id: "daily_capacity", label: "每日可承接多少单人工协调？", type: "radio", required: true, options: ["5单以内", "6-10单", "11-20单", "20单以上"] },
              { id: "ops_risks", label: "试运行中最可能出现的问题", type: "checkbox", required: true, options: ["司机拒单", "用户地址太分散", "货物保管困难", "责任边界不清", "用户催单多", "价格解释困难", "客服工作量增加", "财务对账麻烦"] }
            ]
          },
          {
            title: "规则和系统需求",
            fields: [
              { id: "rules_needed", label: "人工试运行必须先准备哪些规则？", type: "checkbox", required: true, options: ["禁运品规则", "重量/体积上限", "价格表", "加价规则", "取送货时间承诺", "丢损赔付规则", "退款规则", "司机结算规则"] },
              { id: "system_needs", label: "未来轻量版最需要系统解决什么？", type: "checkbox", required: true, options: ["用户下单", "司机接单", "状态流转", "拍照留痕", "自动退款", "结算对账", "客服工单", "价格/线路配置"] },
              { id: "go_trial", label: "是否建议启动2周人工试运行？", type: "radio", required: true, options: ["建议启动", "建议缩小范围后启动", "暂不建议启动"] },
              { id: "ops_comment", label: "主要风险和建议", type: "textarea", required: false }
            ]
          }
        ]
      }
    };

    let currentType = "personal";
    let lastRecord = null;

    const typeGrid = document.getElementById("typeGrid");
    const form = document.getElementById("surveyForm");
    const formTitle = document.getElementById("formTitle");
    const formFields = document.getElementById("formFields");
    const errorBox = document.getElementById("errorBox");
    const resultPanel = document.getElementById("resultPanel");
    const submitBtn = document.getElementById("submitBtn");
    const typeSection = document.querySelector('section[aria-labelledby="type-title"]');

    function initTypes() {
      typeGrid.innerHTML = "";
      types.forEach((type) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "type-btn" + (type.id === currentType ? " active" : "");
        btn.textContent = type.title;
        btn.addEventListener("click", () => {
          currentType = type.id;
          resultPanel.classList.remove("show");
          initTypes();
          renderForm();
        });
        typeGrid.appendChild(btn);
      });
    }

    function renderForm() {
      const schema = schemas[currentType];
      formTitle.textContent = schema.title;
      formFields.innerHTML = "";
      renderSection("基础信息", commonFields);
      schema.sections.forEach((section) => renderSection(section.title, section.fields));
      errorBox.classList.remove("show");
    }

    function renderSection(title, fields) {
      const section = document.createElement("section");
      section.className = "section";
      const h3 = document.createElement("h3");
      h3.textContent = title;
      section.appendChild(h3);
      fields.forEach((field) => section.appendChild(renderField(field)));
      formFields.appendChild(section);
    }

    function renderField(field) {
      const wrap = document.createElement("div");
      wrap.className = "field";
      const label = document.createElement("label");
      label.textContent = field.label;
      label.htmlFor = field.id;
      if (field.required) label.className = "required";
      wrap.appendChild(label);

      if (field.type === "text" || field.type === "tel" || field.type === "number") {
        const input = document.createElement("input");
        input.type = field.type;
        input.id = field.id;
        input.name = field.id;
        input.required = !!field.required;
        wrap.appendChild(input);
      }

      if (field.type === "textarea") {
        const textarea = document.createElement("textarea");
        textarea.id = field.id;
        textarea.name = field.id;
        textarea.required = !!field.required;
        wrap.appendChild(textarea);
      }

      if (field.type === "select") {
        const select = document.createElement("select");
        select.id = field.id;
        select.name = field.id;
        select.required = !!field.required;
        const empty = document.createElement("option");
        empty.value = "";
        empty.textContent = "请选择";
        select.appendChild(empty);
        field.options.forEach((option) => {
          const item = document.createElement("option");
          item.value = option;
          item.textContent = option;
          select.appendChild(item);
        });
        wrap.appendChild(select);
      }

      if (field.type === "radio" || field.type === "checkbox") {
        const choices = document.createElement("div");
        choices.className = "choices";
        field.options.forEach((option, index) => {
          const choice = document.createElement("label");
          choice.className = "choice";
          const input = document.createElement("input");
          input.type = field.type;
          input.name = field.id;
          input.value = option;
          if (field.required && field.type === "radio") input.required = true;
          if (field.required && field.type === "checkbox" && index === 0) {
            input.dataset.requiredGroup = field.id;
          }
          const span = document.createElement("span");
          span.textContent = option;
          choice.appendChild(input);
          choice.appendChild(span);
          choices.appendChild(choice);
        });
        wrap.appendChild(choices);
      }

      return wrap;
    }

    function collectData() {
      const data = {
        record_id: "WF-" + new Date().toISOString().replace(/[-:TZ.]/g, "").slice(0, 14),
        submitted_at: new Date().toLocaleString("zh-CN", { hour12: false }),
        respondent_type: types.find((item) => item.id === currentType).title
      };
      const fields = [...commonFields, ...schemas[currentType].sections.flatMap((section) => section.fields)];
      fields.forEach((field) => {
        if (field.type === "checkbox") {
          data[field.id] = Array.from(form.querySelectorAll(`input[name="${field.id}"]:checked`)).map((item) => item.value).join("；");
        } else if (field.type === "radio") {
          const checked = form.querySelector(`input[name="${field.id}"]:checked`);
          data[field.id] = checked ? checked.value : "";
        } else {
          const input = form.querySelector(`[name="${field.id}"]`);
          data[field.id] = input ? input.value.trim() : "";
        }
      });
      return data;
    }

    function requiredCheckboxValid() {
      const requiredGroups = new Set(Array.from(form.querySelectorAll("[data-required-group]")).map((item) => item.dataset.requiredGroup));
      for (const group of requiredGroups) {
        if (!form.querySelector(`input[name="${group}"]:checked`)) return false;
      }
      return true;
    }


    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      if (!form.checkValidity() || !requiredCheckboxValid()) {
        errorBox.textContent = "请补充必填项后再提交。";
        errorBox.classList.add("show");
        form.reportValidity();
        return;
      }
      errorBox.classList.remove("show");
      lastRecord = collectData();

      submitBtn.disabled = true;
      const originalText = submitBtn.textContent;
      submitBtn.textContent = "正在提交...";

      try {
        const response = await fetch(SURVEY_ENDPOINT, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(lastRecord)
        });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        form.style.display = "none";
        if (typeSection) typeSection.style.display = "none";
        resultPanel.classList.add("show");
        resultPanel.scrollIntoView({ behavior: "smooth", block: "start" });
      } catch (error) {
        errorBox.textContent = "提交失败：" + (error && error.message ? error.message : "网络异常") + "，请稍后重试或联系负责人。";
        errorBox.classList.add("show");
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = originalText;
      }
    });

    document.getElementById("resetBtn").addEventListener("click", () => {
      form.reset();
      errorBox.classList.remove("show");
    });

    document.getElementById("againBtn").addEventListener("click", () => {
      form.reset();
      form.style.display = "";
      if (typeSection) typeSection.style.display = "";
      resultPanel.classList.remove("show");
      window.scrollTo({ top: 0, behavior: "smooth" });
    });


    initTypes();
    renderForm();
  </script>
</body>
</html>
